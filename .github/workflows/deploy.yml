# Deploy W-API Adapter CRM - Docker App
# Arquitetura: GitHub Actions + Self-Hosted Runner
name: Deploy W-API Adapter CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: w-api-adapter-crm
  PORTA: 3002
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # BUILD - Build Docker image e push para ghcr.io
  # ============================================================
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha: ${{ github.sha }}
      timestamp: ${{ steps.time.outputs.datetime }}

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get timestamp
        id: time
        run: echo "datetime=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # ============================================================
          # Docker GHA Cache - Reduces build time by ~70%
          # ============================================================
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ steps.time.outputs.datetime }}
            VCS_REF=${{ github.sha }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          sha: ${{ github.sha }}

      - name: Output image info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Image built successfully"
          echo "Image: ${{ steps.meta.outputs.tags }}"
          echo "SHA: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ============================================================
  # DEPLOY - Pull image e restart no VPS via Self-Hosted Runner
  # ============================================================
  deploy:
    needs: build
    runs-on: self-hosted
    timeout-minutes: 20
    environment: production

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: latest
      W_API_TOKEN: ${{ secrets.W_API_TOKEN }}
      W_API_INSTANCE_ID: ${{ secrets.W_API_INSTANCE_ID }}
      CRM_AGENT_URL: ${{ secrets.CRM_AGENT_URL || 'http://crm-agent:3200' }}
      CRM_AGENT_SECRET: ${{ secrets.CRM_AGENT_SECRET }}

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deploying $APP_NAME"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Use runner's workspace
          WORK_DIR="$GITHUB_WORKSPACE"
          mkdir -p "$WORK_DIR"

          # Image to use (lowercase for docker)
          IMAGE="$REGISTRY/$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]'):$IMAGE_TAG"
          echo "Using image: $IMAGE"

          # ============================================================
          # SAVE CURRENT IMAGE FOR ROLLBACK
          # ============================================================
          echo "Saving current image for rollback..."
          docker tag "$IMAGE" "mtca-$APP_NAME:backup" 2>/dev/null || true

          # Stop and remove existing container
          echo "Stopping existing container..."
          docker stop mtca-w-api-adapter-crm 2>/dev/null || true
          docker rm mtca-w-api-adapter-crm 2>/dev/null || true

          # Pull new image
          echo "Pulling new image..."
          docker pull "$IMAGE"

          # Create .env file with secrets
          printf 'W_API_TOKEN=%s\nW_API_INSTANCE_ID=%s\nCRM_AGENT_URL=%s\nCRM_AGENT_SECRET=%s\nPORT=%s\n' \
            "$W_API_TOKEN" "$W_API_INSTANCE_ID" "$CRM_AGENT_URL" "$CRM_AGENT_SECRET" "$PORTA" > "$WORK_DIR/.env"

          # Start container with new image
          echo "Starting container..."
          docker run -d \
            --name mtca-w-api-adapter-crm \
            --restart unless-stopped \
            --network mtca_internal \
            --env-file "$WORK_DIR/.env" \
            -p $PORTA:$PORTA \
            "$IMAGE"

          # Cleanup .env
          rm -f "$WORK_DIR/.env"

      - name: Wait for startup
        run: |
          echo "Waiting for $APP_NAME to start..."
          sleep 15

      - name: Health Check
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Running Health Check"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS..."

            # Check container status
            CONTAINER_STATUS=$(docker ps --filter "name=mtca-$APP_NAME" --format "{{.Status}}" 2>/dev/null || echo "not found")
            echo "Container status: $CONTAINER_STATUS"

            # Check HTTP health endpoint
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:$PORTA/health" --max-time 10 || echo "000")
            echo "HTTP Status: $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo ""
              echo "✅ Health check PASSED!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            fi

            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo ""
          echo "⚠️ Health check not passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1

      - name: Show logs
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Container Logs"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          docker logs mtca-w-api-adapter-crm --tail=30

      - name: Show container status
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Container Status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          docker ps --filter "name=mtca-$APP_NAME" -a

  # ============================================================
  # ROLLBACK - Executa se deploy falhar
  # ============================================================
  rollback:
    needs: [build, deploy]
    if: failure()
    runs-on: self-hosted
    environment: production

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: latest

    steps:
      - name: Rollback
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️ DEPLOY FAILED - Initiating Rollback"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Stop current
          docker stop mtca-w-api-adapter-crm 2>/dev/null || true
          docker rm mtca-w-api-adapter-crm 2>/dev/null || true

          # Restore backup
          echo "Restoring previous version..."
          docker tag "mtca-$APP_NAME:backup" "mtca-$APP_NAME:latest" 2>/dev/null || true
          docker run -d \
            --name mtca-w-api-adapter-crm \
            --restart unless-stopped \
            --network mtca_internal \
            -p $PORTA:$PORTA \
            "mtca-$APP_NAME:latest"

          echo ""
          echo "✅ Rollback complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify Failure
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ Deployment Failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "App: $APP_NAME"
          echo "Port: $PORTA"
          echo "SHA: ${{ needs.build.outputs.sha }}"
          echo "Image: ${{ needs.build.outputs.image }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Rollback was attempted"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ============================================================
  # SUCCESS - Executa apenas se tudo passar
  # ============================================================
  success:
    needs: [build, deploy]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Success Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "App: $APP_NAME"
          echo "Port: $PORTA"
          echo "Image: ${{ needs.build.outputs.image }}"
          echo "SHA: ${{ needs.build.outputs.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
